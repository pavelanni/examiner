version: "3"

vars:
  BINARY: examiner
  MODULE: github.com/pavelanni/examiner
  IMAGE: examiner
  IMAGE_TAG: latest
  REGISTRY: ghcr.io/pavelanni/examiner
  GIT_SHA:
    sh: git rev-parse --short HEAD
  GIT_DIRTY:
    sh: git diff --quiet && echo "" || echo "-dirty"
  DEV_TAG: "{{.GIT_SHA}}{{.GIT_DIRTY}}"
  DEPLOY_HOST: examiner-01
  QUADLET_DIR: .config/containers/systemd

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list-all

  generate:
    desc: Generate Go code from .templ files
    sources:
      - internal/handler/views/*.templ
    generates:
      - internal/handler/views/*_templ.go
    cmds:
      - templ generate

  build:
    desc: Build the binary
    deps: [generate]
    cmds:
      - go build -o {{.BINARY}} ./cmd/examiner/

  run:
    desc: Build and run the server
    deps: [build]
    cmds:
      - ./{{.BINARY}} {{.CLI_ARGS}}

  test:
    desc: Run tests
    deps: [generate]
    cmds:
      - go test ./...

  vet:
    desc: Run go vet
    deps: [generate]
    cmds:
      - go vet ./...

  lint:
    desc: Run golangci-lint
    deps: [generate]
    cmds:
      - golangci-lint run

  image:
    desc: Build container image with Podman
    cmds:
      - podman build -t {{.IMAGE}}:{{.IMAGE_TAG}} .

  image-run:
    desc: Run container locally with Podman (uses Ollama on host)
    deps: [image]
    cmds:
      - podman volume create examiner-data || true
      - >-
        podman run --rm -it
        -p 8080:8080
        -v examiner-data:/data/db:Z
        -v ./questions/physics_en.json:/data/questions.json:ro,Z
        -e EXAMINER_DB=/data/db/examiner.db
        -e EXAMINER_QUESTIONS=/data/questions.json
        -e EXAMINER_LLM_URL=http://host.containers.internal:11434/v1
        {{.IMAGE}}:{{.IMAGE_TAG}}
        {{.CLI_ARGS}}

  image-amd64:
    desc: Build x86_64 image for cloud deployment
    cmds:
      - >-
        podman build --platform linux/amd64
        -t {{.REGISTRY}}:{{.DEV_TAG}}
        .
      - echo "Built {{.REGISTRY}}:{{.DEV_TAG}}"

  push:
    desc: Push image to ghcr.io
    cmds:
      - podman push {{.REGISTRY}}:{{.DEV_TAG}}
      - echo "Pushed {{.REGISTRY}}:{{.DEV_TAG}}"

  release:
    desc: Build amd64 image and push to ghcr.io
    cmds:
      - task: image-amd64
      - task: push

  deploy:
    desc: Deploy to cloud host (build, push, update both instances, restart)
    cmds:
      - task: release
      - >-
        ssh {{.DEPLOY_HOST}}
        "sed -i 's|^Image=.*|Image={{.REGISTRY}}:{{.DEV_TAG}}|'
        {{.QUADLET_DIR}}/examiner-en.container
        {{.QUADLET_DIR}}/examiner-ru.container &&
        systemctl --user daemon-reload &&
        systemctl --user restart examiner-en examiner-ru"
      - echo "Deployed {{.DEV_TAG}} to {{.DEPLOY_HOST}} (en + ru)"

  deploy-quick:
    desc: Deploy without rebuilding (use current DEV_TAG)
    cmds:
      - >-
        ssh {{.DEPLOY_HOST}}
        "sed -i 's|^Image=.*|Image={{.REGISTRY}}:{{.DEV_TAG}}|'
        {{.QUADLET_DIR}}/examiner-en.container
        {{.QUADLET_DIR}}/examiner-ru.container &&
        systemctl --user daemon-reload &&
        systemctl --user restart examiner-en examiner-ru"
      - echo "Deployed {{.DEV_TAG}} to {{.DEPLOY_HOST}} (en + ru)"

  deploy-status:
    desc: Check service status on cloud host
    cmds:
      - ssh {{.DEPLOY_HOST}} "systemctl --user status examiner-en examiner-ru"

  deploy-logs:
    desc: Show recent logs from cloud host (LANG=en|ru|all, default all)
    vars:
      LANG: '{{.LANG | default "all"}}'
    cmds:
      - >-
        {{if eq .LANG "en"}}ssh {{.DEPLOY_HOST}} "journalctl --user -u examiner-en -n 50 --no-pager"
        {{else if eq .LANG "ru"}}ssh {{.DEPLOY_HOST}} "journalctl --user -u examiner-ru -n 50 --no-pager"
        {{else}}ssh {{.DEPLOY_HOST}} "journalctl --user -u examiner-en -u examiner-ru -n 50 --no-pager"
        {{end}}

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -f {{.BINARY}}
      - rm -f internal/handler/views/*_templ.go

  tidy:
    desc: Tidy go.mod and go.sum
    cmds:
      - go mod tidy

  # ── Exam group management ─────────────────────────────────

  exam-prep:
    desc: Prepare exam databases from manifests (EXAM_DIR=path/to/dir)
    deps: [build]
    requires:
      vars: [EXAM_DIR]
    cmds:
      - |
        for manifest in {{.EXAM_DIR}}/*.yaml; do
          [ -f "$manifest" ] || continue
          # Skip examiner.env or other non-manifest YAML
          basename "$manifest" | grep -q '^examiner' && continue
          echo "==> Preparing $manifest"
          ./{{.BINARY}} prep -m "$manifest" -o "{{.EXAM_DIR}}"
        done

  exam-deploy:
    desc: Deploy exam groups to cloud host (EXAM_DIR=path/to/dir)
    requires:
      vars: [EXAM_DIR]
    vars:
      BASE_PORT: '{{.BASE_PORT | default "8082"}}'
    cmds:
      - |
        set -e

        # Refuse to deploy with a dirty working tree.
        if [ -n "$(git status --porcelain)" ]; then
          echo "ERROR: working tree is dirty — commit or stash before deploying" >&2
          echo "       (a dirty tree produces image tags like '${DEV_TAG}-dirty'" >&2
          echo "       that don't exist on the registry)" >&2
          exit 1
        fi

        # Verify shared env file exists.
        if [ ! -f "{{.EXAM_DIR}}/examiner.env" ]; then
          echo "ERROR: {{.EXAM_DIR}}/examiner.env not found (need LLM key)" >&2
          exit 1
        fi

        # Collect manifests sorted alphabetically for deterministic ports.
        manifests=()
        for f in {{.EXAM_DIR}}/*.yaml; do
          [ -f "$f" ] || continue
          basename "$f" | grep -q '^examiner' && continue
          manifests+=("$f")
        done
        if [ ${#manifests[@]} -eq 0 ]; then
          echo "ERROR: no manifest YAML files found in {{.EXAM_DIR}}" >&2
          exit 1
        fi
        caddy_blocks=""
        services=""
        port={{.BASE_PORT}}

        for manifest in "${manifests[@]}"; do
          exam_id=$(grep '^exam_id:' "$manifest" | awk '{print $2}')
          lang=$(grep '^lang:' "$manifest" | awk '{print $2}')
          prompt_variant=$(grep '^prompt_variant:' "$manifest" | awk '{print $2}')
          num_questions=$(grep '^num_questions:' "$manifest" | awk '{print $2}')
          max_followups=$(grep '^max_followups:' "$manifest" | awk '{print $2}')
          shuffle=$(grep '^shuffle:' "$manifest" | awk '{print $2}')

          echo "==> Deploying $exam_id on port $port"

          # Create host directory.
          ssh {{.DEPLOY_HOST}} "mkdir -p ~/examiner/exams/${exam_id}"

          # Copy pre-seeded DB.
          scp "{{.EXAM_DIR}}/${exam_id}.db" "{{.DEPLOY_HOST}}:~/examiner/exams/${exam_id}/examiner.db"

          # Copy questions file (resolve from manifest).
          questions_file=$(grep '^questions:' "$manifest" | awk '{print $2}')
          manifest_dir=$(dirname "$manifest")
          if [ "${questions_file:0:1}" != "/" ]; then
            questions_file="${manifest_dir}/${questions_file}"
          fi
          scp "$questions_file" "{{.DEPLOY_HOST}}:~/examiner/exams/${exam_id}/questions.json"

          # Generate per-group YAML config.
          {
            [ -n "$lang" ] && echo "lang: $lang"
            [ -n "$prompt_variant" ] && echo "prompt-variant: $prompt_variant"
            [ -n "$num_questions" ] && echo "num-questions: $num_questions"
            [ -n "$max_followups" ] && echo "max-followups: $max_followups"
            [ -n "$shuffle" ] && echo "shuffle: $shuffle"
          } > "/tmp/examiner-${exam_id}.yaml"
          scp "/tmp/examiner-${exam_id}.yaml" "{{.DEPLOY_HOST}}:~/examiner/exams/${exam_id}/examiner.yaml"
          rm -f "/tmp/examiner-${exam_id}.yaml"

          # Copy shared env file.
          scp "{{.EXAM_DIR}}/examiner.env" "{{.DEPLOY_HOST}}:~/examiner/exams/${exam_id}/examiner.env"

          # Generate Quadlet container unit from template.
          sed -e "s|__EXAM_ID__|${exam_id}|g" \
              -e "s|__IMAGE__|{{.REGISTRY}}:{{.DEV_TAG}}|g" \
              -e "s|__PORT__|${port}|g" \
              deploy/exam-group.container.tmpl \
              > "/tmp/examiner-${exam_id}.container"
          scp "/tmp/examiner-${exam_id}.container" "{{.DEPLOY_HOST}}:~/{{.QUADLET_DIR}}/examiner-${exam_id}.container"
          rm -f "/tmp/examiner-${exam_id}.container"

          # Generate Quadlet volume unit from template.
          cp deploy/exam-group.volume.tmpl "/tmp/examiner-${exam_id}-data.volume"
          scp "/tmp/examiner-${exam_id}-data.volume" "{{.DEPLOY_HOST}}:~/{{.QUADLET_DIR}}/examiner-${exam_id}-data.volume"
          rm -f "/tmp/examiner-${exam_id}-data.volume"

          # Seed DB into Podman volume via helper container.
          ssh {{.DEPLOY_HOST}} "
            podman volume create examiner-${exam_id}-data 2>/dev/null || true
            podman run --rm \
              -v examiner-${exam_id}-data:/data/db:Z \
              -v ~/examiner/exams/${exam_id}/examiner.db:/src.db:ro \
              busybox cp /src.db /data/db/examiner.db
          "

          # Build Caddy block for this group.
          caddy_blocks="${caddy_blocks}
        ${exam_id}.examiner.pavelanni.dev {
            reverse_proxy localhost:${port}
        }
        "
          services="${services} examiner-${exam_id}"
          port=$((port + 1))
        done

        # Write Caddyfile.exams on host.
        echo "$caddy_blocks" | ssh {{.DEPLOY_HOST}} "cat > ~/examiner/Caddyfile.exams"

        # Reload systemd and (re)start services.
        ssh {{.DEPLOY_HOST}} "
          systemctl --user daemon-reload
          for svc in ${services}; do
            systemctl --user restart \$svc || echo \"WARNING: \$svc failed to start\"
          done
        "

        # Reload Caddy.
        ssh {{.DEPLOY_HOST}} "sudo systemctl reload caddy"

        # Check if import line exists in main Caddyfile.
        if ! ssh {{.DEPLOY_HOST}} "grep -q 'Caddyfile.exams' /etc/caddy/Caddyfile 2>/dev/null"; then
          echo ""
          echo "NOTE: Add this line to /etc/caddy/Caddyfile on {{.DEPLOY_HOST}}:"
          echo "  import /home/\$(ssh {{.DEPLOY_HOST}} whoami)/examiner/Caddyfile.exams"
        fi

        echo ""
        echo "==> Deployed ${#manifests[@]} exam group(s):${services}"

  exam-status:
    desc: Show status of all exam services on cloud host
    cmds:
      - >-
        ssh {{.DEPLOY_HOST}}
        "systemctl --user list-units 'examiner-*' --no-pager"

  exam-collect:
    desc: Collect exam results from cloud host (EXAM_DIR=path/to/dir)
    deps: [build]
    requires:
      vars: [EXAM_DIR]
    cmds:
      - |
        set -e
        for manifest in {{.EXAM_DIR}}/*.yaml; do
          [ -f "$manifest" ] || continue
          basename "$manifest" | grep -q '^examiner' && continue
          exam_id=$(grep '^exam_id:' "$manifest" | awk '{print $2}')
          echo "==> Collecting results for $exam_id"

          # Copy DB out of Podman volume via helper container, then scp back.
          ssh {{.DEPLOY_HOST}} "
            podman run --rm \
              -v examiner-${exam_id}-data:/data/db:ro \
              -v ~/examiner/exams/${exam_id}:/out:Z \
              busybox cp /data/db/examiner.db /out/examiner.db
          "
          scp "{{.DEPLOY_HOST}}:~/examiner/exams/${exam_id}/examiner.db" \
              "{{.EXAM_DIR}}/${exam_id}.db"

          # Export results locally.
          ./{{.BINARY}} export \
            --db "{{.EXAM_DIR}}/${exam_id}.db" \
            -o "{{.EXAM_DIR}}/${exam_id}-results.json"

          echo "    Saved {{.EXAM_DIR}}/${exam_id}-results.json"
        done

  exam-teardown:
    desc: Tear down exam groups on cloud host (EXAM_DIR=path/to/dir)
    requires:
      vars: [EXAM_DIR]
    cmds:
      - |
        set -e
        services=""
        exam_ids=()

        for manifest in {{.EXAM_DIR}}/*.yaml; do
          [ -f "$manifest" ] || continue
          basename "$manifest" | grep -q '^examiner' && continue
          exam_id=$(grep '^exam_id:' "$manifest" | awk '{print $2}')
          exam_ids+=("$exam_id")
          services="${services} examiner-${exam_id}"
        done

        if [ ${#exam_ids[@]} -eq 0 ]; then
          echo "No exam manifests found in {{.EXAM_DIR}}"
          exit 0
        fi

        echo "==> Tearing down:${services}"

        # Stop services.
        ssh {{.DEPLOY_HOST}} "systemctl --user stop ${services} 2>/dev/null || true"

        # Remove Quadlet files and volumes.
        for exam_id in "${exam_ids[@]}"; do
          ssh {{.DEPLOY_HOST}} "
            rm -f ~/{{.QUADLET_DIR}}/examiner-${exam_id}.container
            rm -f ~/{{.QUADLET_DIR}}/examiner-${exam_id}-data.volume
            podman volume rm examiner-${exam_id}-data 2>/dev/null || true
            rm -rf ~/examiner/exams/${exam_id}
          "
        done

        # Reload systemd, remove Caddyfile, reload Caddy.
        ssh {{.DEPLOY_HOST}} "
          systemctl --user daemon-reload
          rm -f ~/examiner/Caddyfile.exams
          sudo systemctl reload caddy
        "

        echo "==> Teardown complete"
